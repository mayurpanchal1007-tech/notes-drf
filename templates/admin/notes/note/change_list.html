{% extends "admin/change_list.html" %}
{% load i18n %}

{% block content %}

<div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">

    <div class="bg-white dark:bg-base-900 rounded-xl shadow p-6">
        <h3 class="text-gray-500 text-sm">Total Notes</h3>
        <p class="text-3xl font-bold">{{ total_notes }}</p>
    </div>

    <div class="bg-white dark:bg-base-900 rounded-xl shadow p-6">
        <h3 class="text-gray-500 text-sm">Active</h3>
        <p class="text-3xl font-bold">{{ active_notes }}</p>
    </div>

    <div class="bg-white dark:bg-base-900 rounded-xl shadow p-6">
        <h3 class="text-gray-500 text-sm">Archived</h3>
        <p class="text-3xl font-bold">{{ archived_notes }}</p>
    </div>

</div>

{{ block.super }}

{% endblock %}
