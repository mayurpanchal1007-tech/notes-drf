<div class="bg-white dark:bg-base-900 rounded-xl shadow">

    <div class="border-b px-6 py-4">
        <h2 class="text-xl font-semibold">
            📝 Recent Notes
        </h2>
    </div>

    <div class="overflow-x-auto">

        <table class="min-w-full">

            <thead class="bg-gray-50 dark:bg-base-800">

                <tr>
                    <th class="px-6 py-3 text-left text-sm font-semibold">
                        Title
                    </th>

                    <th class="px-6 py-3 text-left text-sm font-semibold">
                        User
                    </th>

                    <th class="px-6 py-3 text-left text-sm font-semibold">
                        Status
                    </th>

                    <th class="px-6 py-3 text-left text-sm font-semibold">
                        Created
                    </th>
                </tr>

            </thead>

            <tbody>

                {% for note in recent_notes %}

                <tr class="border-t hover:bg-gray-50 dark:hover:bg-base-800">

                    <td class="px-6 py-4">
                        {{ note.title }}
                    </td>

                    <td class="px-6 py-4">
                        {{ note.user.username }}
                    </td>

                    <td class="px-6 py-4">

                        {% if note.status == "active" %}

                            <span class="px-2 py-1 rounded bg-green-100 text-green-700">
                                Active
                            </span>

                        {% else %}

                            <span class="px-2 py-1 rounded bg-gray-200 text-gray-700">
                                Archived
                            </span>

                        {% endif %}

                    </td>

                    <td class="px-6 py-4">
                        {{ note.created_at|date:"d M Y H:i" }}
                    </td>

                </tr>

                {% empty %}

                <tr>

                    <td colspan="4" class="px-6 py-10 text-center text-gray-500">

                        No notes found.

                    </td>

                </tr>

                {% endfor %}

            </tbody>

        </table>

    </div>

</div>
